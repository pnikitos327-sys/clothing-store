{% extends 'layout.html' %}

{% block title %}Каталог{% endblock %}

{% block content %}
<div class="container">
    <h1 class="text-center my-4">🔥 Наши товары</h1>
    <div class="row">
        {% for product in products %}
        <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4">
            <div class="card h-100 shadow-sm">
                <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}" style="height: 200px; object-fit: cover;">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ product.name }}</h5>
                    <p class="card-text text-muted small">{{ product.description|truncatewords:10 }}</p>
                    <p class="card-text fw-bold text-primary fs-5">{{ product.price }} ₽</p>
                    <a href="#" class="btn btn-dark mt-auto">В корзину</a>
                </div>
            </div>
        </div>
        {% empty %}
        <p class="text-center">Товаров пока нет</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
